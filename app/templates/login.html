{% extends "base.html" %}

{% block title %}Iniciar sesión{% endblock %}
{% block body_class %}login-page{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', path='css/theme.css') }}?v=1" />
<link rel="stylesheet" href="{{ url_for('static', path='css/login.css') }}?v=1" />
{% endblock %}

{% block content %}
<div class="page-center">
  <div class="login-card">
    <div class="login-logo-wrap">
      <img
        src="{{ url_for('static', path='img/logo-servicio-social.png') }}"
        alt="Servicio Social"
        class="login-logo"
      />
    </div>

    <h1>Iniciar sesión</h1>
    <p>Acceso para administrador, socio formador y becario.</p>

    <form id="loginForm" class="form">
      <div class="form-group">
        <label for="email">Correo</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="tu_correo@ejemplo.com"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Ingresa tu contraseña"
          required
        />
      </div>

      <div id="loginError" class="error" style="display:none;"></div>

      <button type="submit">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
