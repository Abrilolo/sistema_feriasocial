{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="page-center">
  <div class="card login-card fade-in-up">
    <div class="login-logo-wrap">
      <img
        src="{{ url_for('static', path='img/logo-servicio-social.png') }}"
        alt="Servicio Social"
        class="login-logo"
      />
    </div>

    <h1>Iniciar sesión</h1>
    <p class="muted">Acceso para administrador, socio formador y becario.</p>

    <form id="loginForm" class="form">
      <div>
        <label for="email">Correo</label>
        <input type="email" id="email" name="email" placeholder="tu_correo@ejemplo.com" required />
      </div>

      <div>
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required />
      </div>

      <div id="loginError" class="error" style="display:none;"></div>

      <button type="submit">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
