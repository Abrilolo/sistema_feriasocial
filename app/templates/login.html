{% extends "base.html" %}

{% block title %}Iniciar Sesión{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', path='css/login.css') }}?v=3" />
{% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-container">
    <div class="login-card">
      <!-- Header Section -->
      <div class="login-header">
        <div class="login-logo-wrap">
          <img
            src="{{ url_for('static', path='img/logo-servicio-social.png') }}"
            alt="Servicio Social"
            class="login-logo"
          />
        </div>
        <h1>Iniciar Sesión</h1>
        <p>Acceso para administrador, socio formador y becario.</p>
      </div>

      <!-- Form Section -->
      <div class="login-form-wrap">
        <form id="loginForm" class="login-form">
          <!-- Email Field -->
          <div class="login-form-group">
            <label for="email">Correo Electrónico</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="tu_correo@ejemplo.com"
              required
              autocomplete="email"
            />
          </div>

          <!-- Password Field -->
          <div class="login-form-group">
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Ingresa tu contraseña"
              required
              autocomplete="current-password"
            />
          </div>

          <!-- Error Message -->
          <div id="loginError" class="login-error" style="display:none;"></div>

          <!-- Submit Button -->
          <button type="submit" class="login-submit">Entrar</button>
        </form>
      </div>

      <!-- Footer -->
      <div class="login-footer">
        <span class="login-footer-label">Sistema Feria Social</span>
        Tecnológico de Monterrey
      </div>
    </div>
  </div>
</div>
{% endblock %}
