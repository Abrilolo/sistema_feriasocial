{% extends "base.html" %}

{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div class="page-center">
  <div class="card login-card fade-in-up" style="border-left: 4px solid #f1ca49;">
    <div class="login-logo-wrap">
      <img
        src="{{ url_for('static', path='img/logo-servicio-social.png') }}"
        alt="Servicio Social"
        class="login-logo"
      />
    </div>

    <h1 style="color: #0f172a; margin-top: 1.5rem;">Iniciar sesión</h1>
    <p class="muted" style="color: #64748b;">Acceso para administrador, socio formador y becario.</p>

    <form id="loginForm" class="form">
      <div class="form-group">
        <label for="email" style="color: #334155;">Correo</label>
        <input type="email" id="email" name="email" placeholder="tu_correo@ejemplo.com" required />
      </div>

      <div class="form-group">
        <label for="password" style="color: #334155;">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required />
      </div>

      <div id="loginError" class="error" style="display:none;"></div>

      <button type="submit" style="margin-top: 0.5rem; width: 100%;">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
