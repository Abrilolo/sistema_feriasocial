{% extends "base.html" %}

{% block title %}Iniciar sesión{% endblock %}
{% block body_class %}login-page{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', path='css/login.css') }}?v=1" />
{% endblock %}

{% block content %}
<div style="max-width: 1280px; margin: 0 auto; padding: 3rem 1.75rem 5rem;">
  <div class="login-card">
    <div class="login-logo-wrap">
      <img
        src="{{ url_for('static', path='img/logo-servicio-social.png') }}"
        alt="Servicio Social"
        class="login-logo"
      />
    </div>

    <span class="section-label" style="justify-content: center; margin-bottom: 1.5rem; display: flex;">
      <span>Acceso</span>
    </span>

    <h1 style="text-align: center; margin: 0 0 0.5rem 0;">Iniciar sesión</h1>
    <p style="text-align: center; color: var(--text-muted); margin: 0 0 2rem 0;">Acceso para administrador, socio formador y becario.</p>

    <form id="loginForm" class="form">
      <div class="form-group">
        <label for="email">Correo</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="tu_correo@ejemplo.com"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Ingresa tu contraseña"
          required
        />
      </div>

      <div id="loginError" class="error" style="display:none;"></div>

      <button type="submit" style="width: 100%; padding: 1rem;">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
