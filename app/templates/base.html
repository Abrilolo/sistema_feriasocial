<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Sistema Feria Social{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/styles.css') }}" />
</head>
<body>
  <header class="topbar">
    <div class="brand-wrap">
      <img
        src="{{ url_for('static', path='img/logo-servicio-social.png') }}"
        alt="Servicio Social"
        class="brand-logo"
      />
      <div class="brand-texts">
        <span class="brand-title">Sistema Feria Social</span>
        <span class="brand-subtitle">Gestión de registro y seguimiento</span>
      </div>
    </div>

    <nav class="nav">
      <a href="/login">Login</a>
      <a href="/registro">Registro</a>
      <a href="/socio">Socio</a>
      <a href="/becario">Becario</a>
      <a href="/admin-panel">Admin</a>
      <a href="#" id="logoutBtn" class="nav-logout">Salir</a>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', path='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
