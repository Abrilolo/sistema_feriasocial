{% extends "base.html" %}

{% block title %}Catálogo de Proyectos — Feria Social 2026{% endblock %}

{% block content %}
<div class="catalogo-iframe-wrapper">
  <iframe
    src="https://oferta-servicio-social.vercel.app/catalogo?period=feb-jun&search="
    class="catalogo-iframe"
    title="Oferta de Servicio Social — Febrero–Junio 2026"
    loading="lazy"
    allowfullscreen
  ></iframe>

  <div class="catalogo-loading" id="catLoading">
    <div class="catalogo-spinner"></div>
    <p>Cargando catálogo...</p>
  </div>
</div>

<style>
/* ─── Catálogo iframe wrapper ─── */
.catalogo-iframe-wrapper {
  position: fixed;
  /* Adjust top offset to match your topbar/navbar height in base.html */
  top: 64px;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 10;
  background: #f4f7fb;
}

.catalogo-iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* Loading overlay */
.catalogo-loading {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  background: #f4f7fb;
  color: #64748b;
  font-size: 0.9rem;
  pointer-events: none;
  transition: opacity 0.4s;
}
.catalogo-spinner {
  width: 36px;
  height: 36px;
  border: 3px solid #e2e8f0;
  border-top-color: #2563eb;
  border-radius: 50%;
  animation: cat-spin 0.7s linear infinite;
}
@keyframes cat-spin {
  to { transform: rotate(360deg); }
}
</style>

<script>
  // Ocultar loading una vez que el iframe termina de cargar
  const iframe  = document.querySelector('.catalogo-iframe');
  const loading = document.getElementById('catLoading');
  iframe.addEventListener('load', () => {
    loading.style.opacity = '0';
    setTimeout(() => loading.style.display = 'none', 400);
  });
</script>
{% endblock %}
